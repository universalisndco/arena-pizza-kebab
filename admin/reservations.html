<script src="../js/firebase-config.js"></script>

</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">

      <div class="sidebar-logo-sub">Administration</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">Principal</div>
      <a href="index.html" class="nav-item">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Tableau de bord
      </a>
      <a href="orders.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
        Toutes les commandes
      </a>
      <a href="reservations.html" class="nav-item active">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Réservations
      </a>
      <div class="nav-section-title">Gestion</div>
      <a href="menu-manager.html" class="nav-item">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg>
        Gestion du Menu
      </a>
      <div class="nav-section-title">Paramètres</div>
      <a href="../index.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        Voir le site
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user-avatar">A</div>
      <div><div class="sidebar-user-name">Admin APK</div><div class="sidebar-user-role">Administrateur</div></div>
      <button class="btn-logout" onclick="logout()">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <div class="admin-main">
    <div class="topbar">
      <div class="topbar-title">RÉSERVATIONS</div>
      <div class="topbar-actions">
        <button class="topbar-btn" onclick="location.reload()">
          <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
          Actualiser
        </button>
      </div>
    </div>

    <div class="page-content">
      <!-- Stats -->
      <div class="stats-row" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px" id="resStats"></div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">Toutes les réservations</div>
          <div style="display:flex;gap:8px">
            <button class="filter-btn active" data-filter="all">Toutes</button>
            <button class="filter-btn" data-filter="pending">En attente</button>
            <button class="filter-btn" data-filter="accepted">Acceptées</button>
            <button class="filter-btn" data-filter="refused">Refusées</button>
          </div>
        </div>
        <div id="resTable"></div>
      </div>
    </div>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="js/admin.js"></script>
<script>
checkAuth();
initDemoData();

let currentFilter = 'all';

function buildStats() {
  const all = getReservations();
  const pending  = all.filter(r => r.status === 'pending').length;
  const accepted = all.filter(r => r.status === 'accepted').length;
  const refused  = all.filter(r => r.status === 'refused').length;
  document.getElementById('resStats').innerHTML = `
    <div class="stat-card gold">
      <div class="stat-label">En attente</div>
      <div class="stat-value" style="color:var(--gold)">${pending}</div>
      <div class="stat-sub">À confirmer</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Acceptées</div>
      <div class="stat-value" style="color:var(--green)">${accepted}</div>
      <div class="stat-sub">Confirmées</div>
    </div>
    <div class="stat-card red">
      <div class="stat-label">Refusées</div>
      <div class="stat-value" style="color:var(--red)">${refused}</div>
      <div class="stat-sub">Annulées</div>
    </div>
  `;
}

function buildTable() {
  let all = getReservations();
  if (currentFilter !== 'all') all = all.filter(r => r.status === currentFilter);

  const el = document.getElementById('resTable');
  if (all.length === 0) {
    el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--gray)">Aucune réservation trouvée.</div>';
    return;
  }

  el.innerHTML = `
    <div style="display:grid;grid-template-columns:80px 1fr 100px 130px 90px 130px;gap:10px;padding:10px 20px;font-size:.7rem;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:var(--gray2);border-bottom:1px solid rgba(255,255,255,.05)">
      <div>Ref</div><div>Client</div><div>Personnes</div><div>Date & Heure</div><div>Statut</div><div>Actions</div>
    </div>
    ${all.map(r => `
      <div class="res-row">
        <div class="res-id">${r.id}</div>
        <div>
          <div class="res-name">${r.firstName} ${r.lastName}</div>
          <div class="res-phone"><a href="tel:${r.phone}" style="color:var(--gray)">${r.phone}</a></div>
          ${r.message ? `<div style="font-size:.72rem;color:var(--gray);margin-top:2px;font-style:italic">"${r.message}"</div>` : ''}
        </div>
        <div style="font-weight:800">${r.guests} pers.</div>
        <div>
          <div style="font-weight:800;font-size:.85rem">${new Date(r.date).toLocaleDateString('fr-FR',{weekday:'short',day:'2-digit',month:'short'})}</div>
          <div style="font-size:.78rem;color:var(--gray)">${r.time}</div>
        </div>
        <div>
          ${r.status === 'pending'   ? '<span class="status-badge s-pending">En attente</span>'   : ''}
          ${r.status === 'accepted'  ? '<span class="status-badge s-delivering">Acceptée</span>'  : ''}
          ${r.status === 'refused'   ? '<span class="status-badge s-cancelled">Refusée</span>'    : ''}
        </div>
        <div class="res-actions">
          ${r.status !== 'accepted' ? `<button class="btn-accept" onclick="updateRes('${r.id}','accepted')">Accepter</button>` : ''}
          ${r.status !== 'refused'  ? `<button class="btn-refuse" onclick="updateRes('${r.id}','refused')">Refuser</button>`   : ''}
        </div>
      </div>
    `).join('')}
  `;
}

function updateRes(id, status) {
  let reservations = getReservations();
  const idx = reservations.findIndex(r => r.id === id);
  if (idx >= 0) {
    reservations[idx].status = status;
    saveReservations(reservations);
    showToast(status === 'accepted' ? 'Réservation acceptée' : 'Réservation refusée', status === 'accepted' ? 'success' : 'error');
    buildStats();
    buildTable();
  }
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    buildTable();
  });
});

buildStats();
buildTable();
</script>
</body>
</html>
