<body>
<div class="admin-layout">

    <nav class="sidebar-nav">
      <div class="nav-section-title">Principal</div>
      <a href="index.html" class="nav-item">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Tableau de bord
      </a>
      <a href="orders.html" class="nav-item active">
        <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>

      <a href="reservations.html" class="nav-item">

      <div class="nav-section-title">Gestion</div>

        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>
        Gestion du Menu
      </a>
      <div class="nav-section-title">Paramètres</div>
      <a href="../index.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        Voir le site
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user-avatar">A</div>
      <div><div class="sidebar-user-name">Admin APK</div><div class="sidebar-user-role">Administrateur</div></div>
      <button class="btn-logout" onclick="logout()">

      </button>
    </div>
  </aside>

  <div class="admin-main">
    <div class="topbar">
      <div class="topbar-title">TOUTES LES COMMANDES</div>
      <div class="topbar-actions">
        <input type="text" id="searchInput" placeholder="Rechercher (nom, N°...)" style="padding:8px 14px;background:var(--dark3);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:#fff;font-size:.85rem;width:220px" oninput="filterOrders()">
        <button class="topbar-btn" onclick="location.reload()">
          <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
          Actualiser
        </button>
      </div>
    </div>

    <div class="page-content">
      <div class="card">
        <div class="card-header">
          <div class="card-title">Historique des commandes</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="filter-btn active" data-filter="all">Toutes</button>
            <button class="filter-btn" data-filter="today">Aujourd'hui</button>
            <button class="filter-btn" data-filter="pending">En attente</button>
            <button class="filter-btn" data-filter="active">En cours</button>
            <button class="filter-btn" data-filter="done">Terminées</button>
          </div>
        </div>
        <div id="ordersTableFull"></div>
      </div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div id="orderModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2000;align-items:center;justify-content:center">
  <div style="background:var(--dark2);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:28px;position:relative;border:1px solid rgba(255,255,255,.08)">
    <button onclick="closeModal()" style="position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:var(--dark3);color:#fff;font-size:1.1rem;display:flex;align-items:center;justify-content:center">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="js/admin.js"></script>
<script>
checkAuth();
initDemoData();

let currentFilter = 'all';
let searchQuery = '';

function filterOrders() {
  searchQuery = document.getElementById('searchInput').value.toLowerCase();
  buildTable();
}

function buildTable() {
  let orders = getOrders();
  const today = new Date().toDateString();

  if (currentFilter === 'today')   orders = orders.filter(o => new Date(o.timestamp).toDateString() === today);
  if (currentFilter === 'pending') orders = orders.filter(o => o.status === 'pending');
  if (currentFilter === 'active')  orders = orders.filter(o => ['accepted','preparing','ready','delivering'].includes(o.status));
  if (currentFilter === 'done')    orders = orders.filter(o => o.status === 'done');

  if (searchQuery) {
    orders = orders.filter(o =>
      (o.orderNumber||'').toLowerCase().includes(searchQuery) ||
      (o.firstName+' '+o.lastName).toLowerCase().includes(searchQuery) ||
      (o.phone||'').includes(searchQuery)
    );
  }

  const el = document.getElementById('ordersTableFull');
  if (!el) return;

  if (orders.length === 0) {
    el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--gray);font-size:.88rem">Aucune commande trouvée.</div>';
    return;
  }

  el.innerHTML = `
    <div style="display:grid;grid-template-columns:90px 1fr 100px 120px 110px 110px 90px;gap:10px;padding:10px 20px;font-size:.7rem;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:var(--gray2);border-bottom:1px solid rgba(255,255,255,.05)">
      <div>N°</div><div>Client</div><div>Total</div><div>Mode</div><div>Statut</div><div>Date</div><div>Actions</div>
    </div>
    ${orders.map(o => `
      <div class="order-row${o.status==='pending'?' new':''}">
        <div class="order-id" style="font-size:.85rem">${o.orderNumber}</div>
        <div>
          <div class="order-client">${o.firstName} ${o.lastName}</div>
          <div class="order-client-phone">${o.phone}</div>
        </div>
        <div class="order-total">${formatPrice(o.total)}</div>
        <div><span class="order-mode mode-${o.mode==='delivery'?'delivery':'pickup'}">${o.mode==='delivery'?'Livraison':'À emporter'}</span></div>
        <div>${statusBadge(o.status)}</div>
        <div class="order-time" style="font-size:.75rem">${formatDate(o.timestamp)}</div>
        <div style="display:flex;gap:6px">
          <button onclick="openModal('${o.orderNumber}')" style="padding:5px 10px;background:var(--dark3);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#fff;font-size:.75rem;font-weight:800;cursor:pointer">Voir</button>
        </div>
      </div>
    `).join('')}
  `;
}

function openModal(orderNum) {
  const order = getOrders().find(o => o.orderNumber === orderNum);
  if (!order) return;
  const addrHtml = order.mode === 'delivery' && order.address
    ? `<div class="detail-row"><label>Adresse</label><span>${order.address.street}, ${order.address.city}</span></div>${order.address.notes?`<div class="detail-row"><label>Notes</label><span>${order.address.notes}</span></div>`:''}`
    : '';
  const itemsHtml = (order.items||[]).map(i=>`
    <div class="detail-item">
      <span class="detail-item-price">${formatPrice(i.totalPrice*i.qty)}</span>
      <div class="detail-item-name">${i.qty}× ${i.name}</div>
      ${Object.keys(i.selectedOptions||{}).length?`<div class="detail-item-opts">${Object.values(i.selectedOptions).join(' · ')}</div>`:''}
    </div>
  `).join('');
  document.getElementById('modalContent').innerHTML = `
    <div style="margin-bottom:20px">
      <div style="font-family:var(--font-h);font-size:1.6rem;color:var(--gold)">${order.orderNumber}</div>
      <div style="font-size:.8rem;color:var(--gray)">${formatDate(order.timestamp)}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Client</div>
      <div class="detail-row"><label>Nom</label><span>${order.firstName} ${order.lastName}</span></div>
      <div class="detail-row"><label>Tél</label><span><a href="tel:${order.phone}" style="color:var(--gold)">${order.phone}</a></span></div>
      <div class="detail-row"><label>Mode</label><span>${order.mode==='delivery'?'Livraison':'À emporter'}</span></div>
      ${addrHtml}
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Articles</div>
      ${itemsHtml}
      <div style="display:flex;justify-content:space-between;padding:10px 0;border-top:1px solid rgba(255,255,255,.08);font-weight:900">
        <span>Total</span><span style="color:var(--gold)">${formatPrice(order.total)}</span>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Statut</div>
      <select id="modalStatus" class="status-select">
        ${['pending','accepted','preparing','ready','delivering','done','cancelled'].map(s=>`<option value="${s}"${order.status===s?' selected':''}>${STATUS_LABELS[s]}</option>`).join('')}
      </select>
      <button class="btn-update-status" onclick="updateStatusFromModal('${order.orderNumber}')">Mettre à jour</button>
    </div>
  `;
  const modal = document.getElementById('orderModal');
  modal.style.display = 'flex';
}

function updateStatusFromModal(orderNum) {
  const newStatus = document.getElementById('modalStatus').value;
  let orders = getOrders();
  const idx = orders.findIndex(o => o.orderNumber === orderNum);
  if (idx >= 0) { orders[idx].status = newStatus; saveOrders(orders); }
  showToast('Statut mis à jour');
  closeModal();
  buildTable();
}

function closeModal() {
  document.getElementById('orderModal').style.display = 'none';
}

document.getElementById('orderModal').addEventListener('click', e => {
  if (e.target === document.getElementById('orderModal')) closeModal();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    buildTable();
  });
});

buildTable();
</script>
</body>
</html>
