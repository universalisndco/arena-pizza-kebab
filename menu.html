<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu — Arena Pizza Kebab</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍕</text></svg>">
  <style>
    /* ── Filtres pizza ───────────────────────────────── */
    .pizza-filters-wrap { display:none; flex-direction:column; gap:8px; margin-bottom:24px; }
    .pizza-filters-wrap.visible { display:flex; }
    .filter-row { display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
    .filter-row-label { font-size:.68rem; font-weight:900; letter-spacing:1.5px; text-transform:uppercase; color:var(--gray); min-width:44px; flex-shrink:0; }
    .filter-divider { width:1px; height:20px; background:rgba(255,255,255,.1); margin:0 4px; flex-shrink:0; }

    .serie-btn, .base-btn {
      padding:6px 14px; border-radius:50px; font-size:.78rem; font-weight:800;
      background:var(--dark3); color:var(--gray); border:2px solid transparent;
      transition:all .2s; cursor:pointer; font-family:var(--font-b); white-space:nowrap;
    }
    .serie-btn.active, .serie-btn:hover { border-color:#a855f7; color:#c084fc; background:rgba(168,85,247,.1); }
    .base-btn { display:flex; align-items:center; gap:5px; }
    .base-btn.active,  .base-btn:hover  { border-color:var(--red); color:#fff; background:rgba(212,43,43,.1); }
    .base-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

    /* ── Sections pizzas ─────────────────────────────── */
    .pizza-serie-section { margin-bottom: 48px; }
    .pizza-serie-header {
      display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
      margin-bottom:18px; padding-bottom:12px;
      border-bottom:2px solid rgba(245,166,35,.3);
    }
    .pizza-serie-title { font-family:var(--font-h); font-size:clamp(1.2rem,3vw,1.7rem); letter-spacing:2px; color:#fff; }
    .pizza-serie-prices { font-size:.8rem; font-weight:800; color:var(--gold); background:rgba(245,166,35,.1); padding:4px 12px; border-radius:20px; }
    .menu-grid-inner {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
      gap:20px;
    }

    /* ── Promos ──────────────────────────────────────────────── */
    .promo-cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; padding:8px 0; }
    .promo-deal-card { background:var(--dark2); border-radius:14px; padding:24px; display:flex; flex-direction:column; gap:12px; border-top:3px solid transparent; transition:transform .2s, box-shadow .2s; }
    .promo-deal-card:hover { transform:translateY(-3px); box-shadow:0 8px 30px rgba(0,0,0,.4); }
    .promo-deal-header { font-family:var(--font-h); font-size:1rem; letter-spacing:2px; font-weight:900; }
    .promo-deal-desc { font-size:1.05rem; font-weight:700; color:#fff; line-height:1.4; }
    .promo-deal-note { font-size:.8rem; color:var(--gray); }
    .promo-deal-card .btn-promo { margin-top:auto; padding:10px 0; background:var(--red); border:none; border-radius:8px; color:#fff; font-weight:800; font-size:.9rem; cursor:pointer; width:100%; font-family:var(--font-b); letter-spacing:.5px; transition:opacity .2s; }
    .promo-deal-card .btn-promo:hover { opacity:.85; }
    .promo-deal-img { width:100%; height:160px; object-fit:cover; border-radius:8px; }
  </style>
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="container">
    <a href="index.html" class="nav-logo">
      <img src="https://images.unsplash.com/photo-1574071318508-1cdbab80d002?w=100&q=80" alt="APK" class="nav-logo-img">

    <ul class="nav-links">

    <div class="nav-actions">
      <a href="cart.html" class="nav-cart-btn">
        <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="cart-count" style="display:none">0</span>
      </a>
      <button class="nav-burger" id="navBurger"><span></span><span></span><span></span></button>

</nav>
<div class="nav-mobile" id="navMobile">
  <a href="index.html">Accueil</a>
  <a href="menu.html">Menu</a>

  <a href="cart.html" style="color:var(--gold)">Mon Panier</a>
</div>

<div class="page-header">
  <div class="container">
    <div class="page-header-eyebrow">Notre Carte</div>
    <h1>LE <span class="text-red">MENU</span></h1>
    <p>Tous nos plats préparés avec soin — ajoutez au panier et commandez en quelques clics</p>
  </div>
</div>

<div class="promos-section">
  <div class="promos-track" id="promosTrack"></div>
</div>

<section class="menu-section">
  <div class="container">

    <!-- Onglets catégories -->
    <div class="menu-tabs" id="menuTabs"></div>

    <!-- Filtres pizzas : Série + Base uniquement (pas de taille) -->
    <div class="pizza-filters-wrap" id="pizzaFiltersWrap">

      <div class="filter-row">
        <span class="filter-row-label">Série</span>
        <div class="filter-divider"></div>
        <button type="button" class="serie-btn active" data-serie="all">Toutes</button>
        <button type="button" class="serie-btn" data-serie="favoris">Favoris</button>
        <button type="button" class="serie-btn" data-serie="premium">Premium</button>
        <button type="button" class="serie-btn" data-serie="mealLover">Meal Lover</button>
        <button type="button" class="serie-btn" data-serie="signature">Signature</button>
      </div>

      <div class="filter-row">
        <span class="filter-row-label">Base</span>
        <div class="filter-divider"></div>
        <button type="button" class="base-btn active" data-base="all">
          <span class="base-dot" style="background:var(--gray)"></span>Toutes
        </button>
        <button type="button" class="base-btn" data-base="Base Tomate">
          <span class="base-dot" style="background:#e63946"></span>Tomate
        </button>
        <button type="button" class="base-btn" data-base="Base Crème Fraîche">
          <span class="base-dot" style="background:#f8e8c0"></span>Crème Fraîche
        </button>
      </div>

      <div id="seriePriceInfo" style="display:none;font-size:.78rem;color:var(--gray);padding:4px 2px"></div>
    </div>

    <!-- Grille articles -->
    <div id="menuGrid"></div>
  </div>
</section>

    <button class="modal-close" onclick="closeItemModal()">&#x2715;</button>

</div>

    <button class="modal-close" onclick="closePromoModal()">&#x2715;</button>

  Voir le panier

    <div class="footer-bottom" style="border-top:none;padding-top:0">
      <span>© 2026 Arena Pizza Kebab · 88 Rue Lesage · 51100 Reims</span>

    </div>

<script src="js/cart.js"></script>

<script>
var currentCategory = 'pizzas';
var currentSerie    = 'all';
var currentBase     = 'all';

/* ── Slots promos ─────────────────────────────────────────── */
var SIZE_ALL = [
  { name:'Junior · 29cm', priceAdd:0  },
  { name:'Senior · 33cm', priceAdd:3  },
  { name:'Méga · 40cm',   priceAdd:10 }
];
var SIZE_SR = [
  { name:'Senior · 33cm', priceAdd:3  },
  { name:'Méga · 40cm',   priceAdd:10 }
];

/* Logique centralisée : count = nb pizzas requises, discount = type de réduction sur la moins chère */
var PROMO_CONFIG = {
  promo1: { count:3, discount:'half', sizes:SIZE_ALL },
  promo2: { count:4, discount:'free', sizes:SIZE_ALL },
  promo3: { count:3, discount:'free', sizes:SIZE_SR  },
  promo4: { count:2, discount:'half', sizes:SIZE_SR  }
};

/* ── Infos sections pizzas ───────────────────────────────── */
var SERIE_INFO = {
  favoris:   { label:'Nos Pizzas Favoris',  prices:'Junior 9€ · Senior 12€ · Méga 19€' },
  premium:   { label:'Nos Pizzas Premium',   prices:'Junior 10€ · Senior 13€ · Méga 20€' },
  mealLover: { label:'The Meal Lover',        prices:'Junior 11€ · Senior 14€ · Méga 21€' },
  signature: { label:'Signature du Chef',     prices:'Junior 12€ · Senior 15€ · Méga 22€' }
};

/* ── Badge ──────────────────────────────────────────────── */
function getBadgeClass(b) {
  if (!b) return '';
  if (b==='Best-seller'||b==='Populaire') return 'badge-red';
  if (b==='Nouveau'||b==='Duo') return 'badge-gold';
  return 'badge-dark';
}

/* ── Carte article ───────────────────────────────────────── */
function renderCard(item) {
  var priceFrom = item.options && item.options.find(function(o){ return o.type==='size_radio'; })
    ? 'À partir de ' : '';
  return '<div class="menu-card" data-id="' + item.id + '">'
    + '<div class="menu-card-img-wrap">'
    + '<img src="' + item.image + '" alt="' + item.name + '" class="menu-card-img" loading="lazy"'
    + ' onerror="this.src=\'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=400\'">'
    + (item.badge ? '<div class="menu-card-badge"><span class="badge ' + getBadgeClass(item.badge) + '">' + item.badge + '</span></div>' : '')
    + '</div>'
    + '<div class="menu-card-body">'
    + '<div class="menu-card-name">' + item.name + '</div>'
    + '<div class="menu-card-desc">' + item.description + '</div>'
    + '<div class="menu-card-footer">'
    + '<div class="menu-card-price">' + priceFrom + formatPrice(item.price) + '</div>'
    + '<button type="button" class="btn-add" data-id="' + item.id + '" aria-label="Ajouter">+</button>'
    + '</div></div></div>';
}

/* ── Rendu grille ────────────────────────────────────────── */
function renderMenu() {
  var grid = document.getElementById('menuGrid');
  if (!grid) return;

  var items = getItemsByCategory(currentCategory);

  if (currentCategory === 'pizzas') {
    /* ── Filtrer par série si filtre actif ── */
    if (currentSerie !== 'all') {
      items = items.filter(function(i){ return i.serie === currentSerie; });
    }

    /* ── Afficher avec sections quand "Toutes" ── */
    if (currentSerie === 'all') {
      var groups = {};
      items.forEach(function(i){ if (!groups[i.serie]) groups[i.serie] = []; groups[i.serie].push(i); });
      var html = '';
      ['favoris','premium','mealLover','signature'].forEach(function(sid) {
        var grp = groups[sid];
        if (!grp || !grp.length) return;
        var s = SERIE_INFO[sid];
        html += '<div class="pizza-serie-section">'
              + '<div class="pizza-serie-header">'
              + '<div class="pizza-serie-title">' + s.label + '</div>'
              + '<div class="pizza-serie-prices">' + s.prices + '</div>'
              + '</div>'
              + '<div class="menu-grid-inner">' + grp.map(renderCard).join('') + '</div>'
              + '</div>';
      });
      grid.innerHTML = html || '<div style="padding:40px;text-align:center;color:var(--gray)">Aucun article.</div>';
    } else {
      /* ── Série filtrée : grille simple ── */
      if (!items.length) {
        grid.innerHTML = '<div style="padding:40px;text-align:center;color:var(--gray)">Aucun article.</div>';
      } else {
        var s = SERIE_INFO[currentSerie];
        grid.innerHTML = '<div class="pizza-serie-section">'
          + '<div class="pizza-serie-header">'
          + '<div class="pizza-serie-title">' + s.label + '</div>'
          + '<div class="pizza-serie-prices">' + s.prices + '</div>'
          + '</div>'
          + '<div class="menu-grid-inner">' + items.map(renderCard).join('') + '</div>'
          + '</div>';
      }
    }
  } else if (currentCategory === 'promos') {
    /* ── Promos ── */
    renderPromos();
    return;
  } else {
    /* ── Autres catégories ── */
    if (!items.length) {
      grid.innerHTML = '<div style="padding:40px;text-align:center;color:var(--gray)">Aucun article.</div>';
      return;
    }
    grid.innerHTML = '<div class="menu-grid">' + items.map(renderCard).join('') + '</div>';
  }

  /* ── Événements cartes ── */
  grid.querySelectorAll('.menu-card').forEach(function(card) {
    card.addEventListener('click', function(e) {
      if (e.target.closest('.btn-add')) return;
      openItemModal(card.dataset.id);
    });
  });
  grid.querySelectorAll('.btn-add').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      openItemModal(btn.dataset.id);
    });
  });
}

/* ── Rendu promos ────────────────────────────────────────── */
function renderPromos() {
  var grid = document.getElementById('menuGrid');
  if (!grid) return;
  var html = '<div class="promo-cards-grid">';
  APK_MENU.promos.forEach(function(p) {
    html += '<div class="promo-deal-card" style="border-top-color:' + p.color + '">'
      + (p.image ? '<img src="' + p.image + '" alt="' + p.title + '" class="promo-deal-img" onerror="this.style.display=\'none\'">' : '')
      + '<div class="promo-deal-header" style="color:' + p.color + '">' + p.title + '</div>'
      + '<div class="promo-deal-desc">' + p.description + '</div>'
      + '<div class="promo-deal-note">' + p.note + '</div>'
      + '<button class="btn-promo" onclick="openPromoModal(\'' + p.id + '\')">Commander cette promo</button>'
      + '</div>';
  });
  html += '</div>';
  grid.innerHTML = html;
}

function openPromoModal(promoId) {
  if (typeof getOrderingStatus !== 'undefined') {
    var st = getOrderingStatus();
    if (st === 'closed') { showHoursMessage('closed'); return; }
    if (st === 'call')   { showHoursMessage('call');   return; }
  }
  var promo = APK_MENU.promos.find(function(p){ return p.id === promoId; });
  var cfg   = PROMO_CONFIG[promoId];
  if (!promo || !cfg) return;
  var modal = document.getElementById('promo-modal');
  var body  = document.getElementById('promo-modal-body');
  if (!modal || !body) return;

  var pizzas = APK_MENU.items.filter(function(it){ return it.category === 'pizzas'; });
  var discountLabel = cfg.discount === 'free' ? 'offerte' : 'à -50%';

  var html = '<div style="border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:16px;padding-bottom:14px">'
    + '<h3 style="color:' + promo.color + ';font-family:var(--font-h);letter-spacing:2px;margin-bottom:6px">' + promo.title + '</h3>'
    + '<p style="color:#fff;font-weight:700">' + promo.description + '</p>'
    + '<small style="color:var(--gold)">★ La réduction s\'applique automatiquement sur la pizza la moins chère</small>'
    + '</div>';

  html += '<form id="promo-form">';

  for (var i = 0; i < cfg.count; i++) {
    var sep = i > 0 ? 'border-top:1px solid rgba(255,255,255,.08);margin-top:14px;padding-top:14px' : '';

    html += '<div class="promo-slot-block" data-slot="' + i + '" style="' + sep + '">'
      + '<div style="font-weight:800;font-size:.92rem;margin-bottom:10px;color:#fff">Pizza ' + (i + 1) + '</div>';

    /* Pizza selector */
    html += '<div class="option-group" style="margin-bottom:8px">'
      + '<label class="option-label">Choisir la pizza <span class="req">*</span></label>'
      + '<select class="option-select promo-pizza-sel" name="promo_pizza_' + i + '" data-slot="' + i + '" required>'
      + '<option value="">— Sélectionner une pizza —</option>';
    pizzas.forEach(function(pz) {
      html += '<option value="' + pz.id + '" data-price="' + pz.price + '">'
        + pz.name + ' — ' + pz.description + '</option>';
    });
    html += '</select></div>';

    /* Taille */
    html += '<div class="option-group" style="margin-bottom:8px">'
      + '<label class="option-label">Taille <span class="req">*</span></label>'
      + '<div class="radio-group size-group">';
    cfg.sizes.forEach(function(sz, si) {
      html += '<label class="radio-label size-label' + (si === 0 ? ' selected' : '') + '">'
        + '<input type="radio" name="promo_size_' + i + '" value="' + sz.name + '" data-price-add="' + sz.priceAdd + '"' + (si === 0 ? ' checked' : '') + ' required>'
        + '<span class="size-name">' + sz.name + '</span>'
        + '<span class="size-price" id="psz-' + i + '-' + si + '">—</span>'
        + '</label>';
    });
    html += '</div></div>';

    /* Base */
    html += '<div class="option-group" style="margin-bottom:8px">'
      + '<label class="option-label">Base <span class="req">*</span></label>'
      + '<div class="radio-group">'
      + '<label class="radio-label"><input type="radio" name="promo_base_' + i + '" value="Base Tomate" checked required><span>Tomate</span></label>'
      + '<label class="radio-label"><input type="radio" name="promo_base_' + i + '" value="Base Crème Fraîche"><span>Crème Fraîche</span></label>'
      + '</div></div>';

    /* Demandes spéciales */
    html += '<div class="option-group">'
      + '<label class="option-label">Demandes spéciales</label>'
      + '<textarea class="form-textarea promo-slot-req" data-idx="' + i + '"'
      + ' placeholder="ex. sans oignons, bien cuit, extra fromage…"'
      + ' style="min-height:48px;font-size:.85rem"></textarea>'
      + '</div>';

    html += '</div>';
  }

  html += '</form>';
  html += '<div class="modal-footer" style="flex-direction:column;gap:8px;align-items:stretch">'
    + '<div id="promo-recap" style="font-size:.8rem;color:var(--gold);text-align:right;min-height:1.2em"></div>'
    + '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px">'
    + '<div class="modal-price-line">Total : <strong id="promo-total">—</strong></div>'
    + '<button class="btn-add-confirm" id="promo-confirm-btn" onclick="confirmPromoCart(\'' + promoId + '\')" style="opacity:.4;cursor:not-allowed" disabled>Ajouter au panier</button>'
    + '</div></div>';

  body.innerHTML = html;
  modal.classList.add('active');
  _setupPromoListeners(promoId);
}

function _setupPromoListeners(promoId) {
  var cfg = PROMO_CONFIG[promoId];

  function recalc() {
    var prices = [];
    var allOk  = true;

    for (var i = 0; i < cfg.count; i++) {
      var sel     = document.querySelector('.promo-pizza-sel[data-slot="' + i + '"]');
      var sInp    = document.querySelector('input[name="promo_size_' + i + '"]:checked');
      var pxPrice = sel && sel.value ? parseFloat(sel.selectedOptions[0].dataset.price || 0) : NaN;
      var sAdd    = sInp ? parseFloat(sInp.dataset.priceAdd || 0) : 0;

      /* Mettre à jour les labels de prix par taille */
      cfg.sizes.forEach(function(sz, si) {
        var el = document.getElementById('psz-' + i + '-' + si);
        if (!el) return;
        el.textContent = isNaN(pxPrice) ? '—' : formatPrice(pxPrice + sz.priceAdd);
      });

      if (!sel || !sel.value) { allOk = false; }
      else prices.push({ idx: i, price: pxPrice + sAdd });
    }

    var tEl     = document.getElementById('promo-total');
    var recapEl = document.getElementById('promo-recap');
    var btn     = document.getElementById('promo-confirm-btn');

    if (!allOk || prices.length < cfg.count) {
      if (tEl)     tEl.textContent   = '—';
      if (recapEl) recapEl.textContent = '';
      if (btn) { btn.disabled = true; btn.style.opacity = '.4'; btn.style.cursor = 'not-allowed'; }
      return;
    }

    /* Trouver la moins chère et appliquer la réduction */
    prices.sort(function(a, b) { return a.price - b.price; });
    var cheapest    = prices[0];
    var discountAmt = cfg.discount === 'free' ? cheapest.price : Math.round(cheapest.price * 50) / 100;
    var fullTotal   = prices.reduce(function(s, p) { return s + p.price; }, 0);
    var finalTotal  = fullTotal - discountAmt;
    var dLabel      = cfg.discount === 'free' ? 'offerte' : 'à -50%';

    if (tEl)     tEl.textContent  = formatPrice(finalTotal);
    if (recapEl) recapEl.innerHTML = '🎁 Pizza la moins chère (' + formatPrice(cheapest.price) + ') ' + dLabel
      + ' — Économie : <strong>-' + formatPrice(discountAmt) + '</strong>';
    if (btn) { btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer'; }
  }

  document.querySelectorAll('#promo-form .promo-pizza-sel, #promo-form input[type=radio]').forEach(function(el) {
    el.addEventListener('change', recalc);
  });
  recalc();
}

function confirmPromoCart(promoId) {
  var promo = APK_MENU.promos.find(function(p){ return p.id === promoId; });
  var cfg   = PROMO_CONFIG[promoId];
  if (!promo || !cfg) return;

  /* Collecter tous les slots */
  var slots = [];
  for (var i = 0; i < cfg.count; i++) {
    var sel   = document.querySelector('.promo-pizza-sel[data-slot="' + i + '"]');
    var sInp  = document.querySelector('input[name="promo_size_' + i + '"]:checked');
    var bInp  = document.querySelector('input[name="promo_base_' + i + '"]:checked');
    var reqEl = document.querySelector('.promo-slot-req[data-idx="' + i + '"]');
    var pizza = sel && sel.value ? getItemById(sel.value) : null;
    var sAdd  = sInp ? parseFloat(sInp.dataset.priceAdd || 0) : 0;
    slots.push({
      idx:   i,
      pizza: pizza,
      price: pizza ? pizza.price + sAdd : 0,
      size:  sInp ? sInp.value : '',
      base:  bInp ? bInp.value : 'Base Tomate',
      req:   reqEl ? reqEl.value.trim() : ''
    });
  }

  /* Identifier la moins chère */
  var sorted      = slots.slice().sort(function(a, b) { return a.price - b.price; });
  var cheapestIdx = sorted[0].idx;

  slots.forEach(function(slot) {
    var price      = slot.price;
    var nameSuffix = '';
    if (slot.idx === cheapestIdx) {
      price      = cfg.discount === 'free' ? 0 : Math.round(price * 50) / 100;
      nameSuffix = cfg.discount === 'free' ? ' 🎁 OFFERTE' : ' 🎁 -50%';
    }
    var shortSize = slot.size ? slot.size.split('·')[0].trim() : '';
    Cart.add({
      id:              promoId + '-p' + slot.idx + '-' + Date.now(),
      name:            promo.title + ' · ' + (slot.pizza ? slot.pizza.name : 'Pizza') + (shortSize ? ' ' + shortSize : '') + nameSuffix,
      totalPrice:      Math.round(price * 100) / 100,
      selectedOptions: { Taille: slot.size, Base: slot.base },
      specialRequest:  slot.req,
      image:           slot.pizza ? slot.pizza.image : 'https://images.unsplash.com/photo-1598023696416-0193a0bcd302?w=400'
    });
  });

  closePromoModal();
}

function closePromoModal() {
  var modal = document.getElementById('promo-modal');
  if (modal) modal.classList.remove('active');
}

/* ── Onglets catégories ──────────────────────────────────── */
function buildTabs() {
  var el = document.getElementById('menuTabs');
  if (!el) return;
  el.innerHTML = APK_MENU.categories.map(function(c) {
    return '<button type="button" class="menu-tab' + (c.id===currentCategory?' active':'') + '" data-cat="' + c.id + '">' + c.label + '</button>';
  }).join('');
  el.querySelectorAll('.menu-tab').forEach(function(btn) {
    btn.addEventListener('click', function() {
      currentCategory = btn.dataset.cat;
      currentSerie = 'all'; currentBase = 'all';
      el.querySelectorAll('.menu-tab').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      var wrap = document.getElementById('pizzaFiltersWrap');
      if (wrap) wrap.classList.toggle('visible', currentCategory==='pizzas');
      resetFilters();
      renderMenu();
    });
  });
}

/* ── Filtres pizza ───────────────────────────────────────── */
function buildFilters() {
  var wrap = document.getElementById('pizzaFiltersWrap');
  if (!wrap) return;
  if (currentCategory === 'pizzas') wrap.classList.add('visible');

  wrap.querySelectorAll('.serie-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      currentSerie = btn.dataset.serie;
      wrap.querySelectorAll('.serie-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      var info = document.getElementById('seriePriceInfo');
      if (info) {
        if (currentSerie !== 'all' && SERIE_INFO[currentSerie]) {
          info.textContent = SERIE_INFO[currentSerie].label + ' — ' + SERIE_INFO[currentSerie].prices;
          info.style.display = 'block';
        } else { info.style.display = 'none'; }
      }
      renderMenu();
    });
  });

  wrap.querySelectorAll('.base-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      currentBase = btn.dataset.base;
      wrap.querySelectorAll('.base-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      renderMenu();
    });
  });
}

function resetFilters() {
  var wrap = document.getElementById('pizzaFiltersWrap');
  if (!wrap) return;
  wrap.querySelectorAll('.serie-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.serie==='all'); });
  wrap.querySelectorAll('.base-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.base==='all'); });
  var info = document.getElementById('seriePriceInfo');
  if (info) info.style.display = 'none';
}

/* ── Promos ──────────────────────────────────────────────── */
function buildPromos() {
  var track = document.getElementById('promosTrack');
  if (!track) return;
  var items = APK_MENU.promos.concat(APK_MENU.promos);
  track.innerHTML = items.map(function(p) {
    return '<div class="promo-item"><div class="dot"></div>' + p.title + ' — ' + p.description + ' · ' + p.note + '</div>';
  }).join('');
}

/* ── Init ────────────────────────────────────────────────── */
function initFromHash() {
  var hash = window.location.hash.replace('#', '');
  if (hash && APK_MENU.categories.find(function(c){ return c.id===hash; })) {
    currentCategory = hash;
  }
}

/* ── Bannière horaires si fermé ──────────────────────────── */
(function() {
  if (typeof getOrderingStatus === 'undefined') return;
  var status = getOrderingStatus();
  if (status === 'open') return;
  var phone = APK_MENU && APK_MENU.info ? APK_MENU.info.phone1 : '09 83 39 82 20';
  var msg = status === 'closed'
    ? '⏰ Nous sommes fermés — Horaires : 11h–13h15 et 18h–22h15'
    : '📞 Commandes en ligne terminées — Appelez le ' + phone;
  var bar = document.createElement('div');
  bar.style.cssText = 'background:var(--red);color:#fff;text-align:center;padding:10px 20px;font-weight:800;font-size:.85rem';
  bar.textContent = msg;
  document.querySelector('.promos-section')?.insertAdjacentElement('afterend', bar);
})();

initFromHash();
buildPromos();
buildTabs();
buildFilters();
renderMenu();
Cart.load();

document.addEventListener('click', function(e) {
  if (e.target.id === 'promo-modal') closePromoModal();
});
</script>
</body>
</html>
