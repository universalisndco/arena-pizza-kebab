<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commande confirmée — Arena Pizza Kebab</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .confirm-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
    .confirm-card { background:var(--dark2); border:1px solid rgba(255,255,255,.08); border-radius:24px; padding:48px 36px; max-width:480px; width:100%; text-align:center; }
    .confirm-icon { width:80px; height:80px; border-radius:50%; background:rgba(34,197,94,.15); border:2px solid #22c55e; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; }
    .confirm-icon svg { width:40px; height:40px; }
    .confirm-title { font-family:var(--font-h); font-size:2rem; margin-bottom:8px; color:#fff; }
    .confirm-subtitle { color:var(--gray); font-size:.9rem; margin-bottom:28px; line-height:1.6; }
    .confirm-order { background:var(--dark3); border-radius:12px; padding:16px 20px; margin-bottom:28px; }
    .confirm-order-num { font-size:1.6rem; font-weight:900; color:var(--gold); }
    .confirm-order-label { font-size:.75rem; color:var(--gray); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
    .confirm-btn { display:inline-block; padding:14px 32px; background:var(--red); color:#fff; border-radius:12px; font-weight:900; text-decoration:none; font-size:.9rem; }
  </style>
</head>
<body>
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">
      <img src="img/logo.png" alt="APK" class="nav-logo-img">
      <span class="nav-logo-name">ARENA <span class="red">PIZZA</span> KEBAB</span>
    </a>
  </div>
</nav>

<div class="confirm-page">
  <div class="confirm-card" id="confirmCard">
    <div style="text-align:center;color:var(--gray);padding:40px">Vérification du paiement…</div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/cart.js"></script>
<script>
(async function() {
  var params   = new URLSearchParams(window.location.search);
  var orderNum = params.get('order');
  var source   = params.get('source'); // 'sumup' si paiement SumUp
  var card     = document.getElementById('confirmCard');

  // ── Flux SumUp : verifier le paiement et creer la commande ──
  if (source === 'sumup' && orderNum) {
    try {
      // Recuperer les donnees de commande depuis localStorage
      var pendingData = null;
      try { pendingData = JSON.parse(localStorage.getItem('apk_pending_order') || 'null'); } catch(e) {}

      // Appeler notre endpoint de verification
      var verifyResp = await fetch('/api/verify-sumup-payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          checkoutReference: orderNum,
          orderData: pendingData
        })
      });
      var result = await verifyResp.json();

      if (result.paid) {
        // Paiement confirme → afficher confirmation
        Cart.clear();
        localStorage.removeItem('apk_pending_order');
        if (card) {
          card.innerHTML = `
            <div style="text-align:center;padding:40px 20px">
              <div style="font-size:4rem;margin-bottom:16px">✅</div>
              <h1 style="font-family:var(--font-h);font-size:2.5rem;color:#fff;margin-bottom:8px">
                COMMANDE CONFIRMEE !
              </h1>
              <p style="color:rgba(255,255,255,.7);margin-bottom:24px">
                Votre paiement a ete accepte.<br>
                Commande <strong>${orderNum}</strong> en preparation !
              </p>
              <a href="index.html" class="btn btn-primary">Retour a l'accueil</a>
            </div>
          `;
        }
      } else {
        // Paiement pas confirme
        if (card) {
          card.innerHTML = `
            <div style="text-align:center;padding:40px 20px">
              <div style="font-size:3rem;margin-bottom:16px">⏳</div>
              <h2 style="color:#fff">Paiement en cours de verification...</h2>
              <p style="color:rgba(255,255,255,.7)">Statut : ${result.status || 'inconnu'}</p>
              <a href="checkout.html" class="btn btn-outline" style="margin-top:20px">Retour au panier</a>
            </div>
          `;
        }
      }
    } catch(e) {
      console.error('Erreur verification SumUp:', e);
    }
    return;
  }

  // ── Flux Cash : juste afficher la confirmation ──────────────
  var pending = null;
  try { pending = JSON.parse(localStorage.getItem('apk_pending_order') || 'null'); } catch(e) {}

  if (pending && pending._id) {
    try {
      await db.collection('orders').doc(pending._id).update({
        stripeSessionId: params.get('session_id') || '',
        confirmedAt: new Date().toISOString()
      });
    } catch(e) { console.warn('Firebase update error:', e); }
  }

  Cart.clear();
  localStorage.removeItem('apk_pending_order');
</script>
</body>
</html>
