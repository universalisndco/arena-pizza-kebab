<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commande confirmée — Arena Pizza Kebab</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: var(--dark); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .confirm-box {
      background: var(--dark2);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }
    .confirm-icon { font-size: 4rem; margin-bottom: 16px; }
    .confirm-title { font-family: var(--font-h); font-size: 2.2rem; color: #fff; margin-bottom: 12px; }
    .confirm-sub { color: rgba(255,255,255,.6); font-size: 1rem; line-height: 1.6; margin-bottom: 32px; }
    .confirm-order { background: var(--dark3); border-radius: 12px; padding: 14px 20px; margin-bottom: 28px; font-weight: 700; color: var(--gold); font-size: 1.1rem; }
    .btn-home { display: inline-block; background: var(--red); color: #fff; padding: 14px 32px; border-radius: 50px; font-weight: 900; text-decoration: none; font-size: 1rem; }
  </style>
</head>
<body>

<div class="confirm-box" id="confirmCard">
  <div class="confirm-icon">⏳</div>
  <div class="confirm-title">Traitement...</div>
</div>

<script src="js/cart.js"></script>
<script>
(function() {
  var params   = new URLSearchParams(window.location.search);
  var method   = params.get('method');   // 'cash'
  var sessionId = params.get('session_id'); // Stripe
  var card     = document.getElementById('confirmCard');

  // ══════════════════════════════════════════════════════
  // FLUX CASH — pas de vérification, confirmation directe
  // ══════════════════════════════════════════════════════
  if (method === 'cash') {
    var pending = null;
    try { pending = JSON.parse(localStorage.getItem('apk_pending_order') || 'null'); } catch(e) {}
    var orderNum = pending ? pending.orderNumber : 'APK-???';

    cart.innerHTML = card.innerHTML = `
      <div class="confirm-icon">✅</div>
      <div class="confirm-title">COMMANDE CONFIRMÉE !</div>
      <div class="confirm-order">Commande ${orderNum}</div>
      <div class="confirm-sub">
        Votre commande a bien été reçue.<br>
        <strong>Le restaurant va vous appeler dans quelques minutes</strong><br>
        pour confirmer et organiser votre commande.
      </div>
      <a href="index.html" class="btn-home">🏠 Retour à l'accueil</a>
    `;

    // Vider le panier
    try { Cart.clear(); } catch(e) {}
    localStorage.removeItem('apk_pending_order');
    return;
  }

  // ══════════════════════════════════════════════════════
  // FLUX CARTE (Stripe) — afficher confirmation
  // La commande est déjà créée par le webhook Stripe
  // ══════════════════════════════════════════════════════
  if (sessionId) {
    var pending2 = null;
    try { pending2 = JSON.parse(localStorage.getItem('apk_pending_order') || 'null'); } catch(e) {}
    var orderNum2 = pending2 ? pending2.orderNumber : 'APK-???';

    card.innerHTML = `
      <div class="confirm-icon">✅</div>
      <div class="confirm-title">PAIEMENT CONFIRMÉ !</div>
      <div class="confirm-order">Commande ${orderNum2}</div>
      <div class="confirm-sub">
        Votre paiement a été accepté.<br>
        <strong>Le restaurant va vous appeler dans quelques minutes</strong><br>
        pour confirmer et organiser votre commande.
      </div>
      <a href="index.html" class="btn-home">🏠 Retour à l'accueil</a>
    `;

    try { Cart.clear(); } catch(e) {}
    localStorage.removeItem('apk_pending_order');
    return;
  }

  // Fallback
  card.innerHTML = `
    <div class="confirm-icon">✅</div>
    <div class="confirm-title">COMMANDE REÇUE !</div>
    <div class="confirm-sub">Le restaurant va vous appeler dans quelques minutes.</div>
    <a href="index.html" class="btn-home">🏠 Retour à l'accueil</a>
  `;
  try { Cart.clear(); } catch(e) {}
})();
</script>
</body>
</html>
